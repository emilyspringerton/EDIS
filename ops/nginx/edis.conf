# EDIS WordPress nginx config — edis.fatbaby.io
#
# Deploy:
#   cp ops/nginx/edis.conf /etc/nginx/sites-available/edis
#   ln -sf /etc/nginx/sites-available/edis /etc/nginx/sites-enabled/edis
#   nginx -t && systemctl reload nginx
#
# Then run ops/certbot/setup.sh to obtain the certificate.
# Certbot will rewrite the ssl_certificate lines automatically.
#
# WordPress root: /var/www/edis
# PHP-FPM socket: /run/php/php8.1-fpm.sock (adjust for your PHP version)

# WordPress-specific cache zones
limit_req_zone $binary_remote_addr zone=edis_rl:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=edis_admin_rl:10m rate=2r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name edis.fatbaby.io www.edis.fatbaby.io;

    # Let certbot's ACME HTTP-01 challenge through before cert is issued.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://edis.fatbaby.io$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name edis.fatbaby.io www.edis.fatbaby.io;

    # TLS — certbot replaces these with managed paths.
    ssl_certificate     /etc/letsencrypt/live/edis.fatbaby.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edis.fatbaby.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — 1 year, include subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    root  /var/www/edis;
    index index.php;

    # Character set for HTML responses.
    charset utf-8;

    gzip on;
    gzip_types text/html text/css application/json application/javascript
               text/xml application/xml application/rss+xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── WordPress: deny sensitive files ──────────────────────────────────────
    location ~* /(?:xmlrpc\.php|wp-config\.php|readme\.html|license\.txt) {
        deny all;
        return 404;
    }

    # Deny dotfiles except .well-known.
    location ~ /\.(?!well-known\/) {
        deny all;
    }

    # ── WordPress admin: tighter rate limit ───────────────────────────────────
    location ~ ^/wp-(admin|login) {
        limit_req zone=edis_admin_rl burst=5 nodelay;
        try_files $uri $uri/ /index.php?$args;

        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   unix:/run/php/php8.1-fpm.sock;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 120s;
        }
    }

    # ── WP-JSON REST API ──────────────────────────────────────────────────────
    location /wp-json/ {
        limit_req zone=edis_rl burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # ── Static assets: long cache ─────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|webp|svg|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Ticker page (/ticker/AAPL) ────────────────────────────────────────────
    location ~ ^/ticker/[A-Z]{1,6}$ {
        limit_req zone=edis_rl burst=30 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # ── WordPress main location ───────────────────────────────────────────────
    location / {
        limit_req zone=edis_rl burst=40 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Only allow PHP files that exist — prevents Nginx passing missing files to PHP.
        try_files $uri =404;

        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.1-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  HTTP_PROXY "";   # block httpoxy
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── DIS collector passthrough ─────────────────────────────────────────────
    # The WordPress edis-dis plugin reads from /dis/health via wp_remote_get(),
    # but this block exposes the same endpoint publicly so the collector can be
    # queried directly for monitoring dashboards if needed.
    location /dis/ {
        proxy_pass         http://127.0.0.1:9099;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        # Only allow internal access — DIS data is ops-internal.
        allow 127.0.0.1;
        allow ::1;
        deny  all;
    }

    # ── Uploads: block PHP execution inside uploads ───────────────────────────
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
        return 404;
    }

    # ── robots.txt ────────────────────────────────────────────────────────────
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
